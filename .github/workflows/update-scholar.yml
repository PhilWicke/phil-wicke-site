name: Update Scholar metrics

# Refreshes assets/scholar.json from Google Scholar so the site's citation block
# stays current without a backend. If Scholar blocks the request, the previous JSON is kept.

on:
  schedule:
    - cron: "0 6 * * 1"      # every Monday, 06:00 UTC
  workflow_dispatch: {}        # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Fetch Scholar metrics
        run: python pipeline/fetch_scholar.py
      - name: Rebuild injected feeds (activity, teaching, service, research papers)
        run: python pipeline/build_archives.py
      - name: Commit if changed
        run: |
          git config user.name "scholar-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No change."
          else
            git commit -m "chore: refresh Scholar metrics + feeds"
            git push
          fi
